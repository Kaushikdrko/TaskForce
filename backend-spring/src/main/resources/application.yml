spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: TaskForce
  datasource:
    url: jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres
    username: postgres.zoiaahtvppzczqinrclw
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never

app:
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  supabase:
    url: ${SUPABASE_URL:https://zoiaahtvppzczqinrclw.supabase.co}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    calendar-api-key: ${GOOGLE_CALENDAR_API_KEY:}
